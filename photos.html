<script>
const username = "hanjoojn";
const repo = "hanjoojn.github.io";
const folder = "Photos";

const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

async function loadImages() {
  try {
    const response = await fetch(apiUrl);

    if (!response.ok) {
      throw new Error("GitHub API error");
    }

    const files = await response.json();
    const gallery = document.getElementById("photobox");

    files.filter(file =>
        file.type === "file" &&
        /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name)
      )
    
    for (let i = 0; i < files.length; i += 3) {

    // Create row wrapper
    const row = document.createElement("div");
    row.classList.add("photobox");

    // Get next 3 images
    const group = files.slice(i, i + 3);

    const fragment = document.createDocumentFragment();

    group.forEach(file => {
      const wrapper = document.createElement("div");

      const img = document.createElement("img");
      img.onload = function () {
        wrapper.style.aspectRatio = img.naturalWidth / img.naturalHeight;
      };
      img.src = file.download_url;
      img.alt = file.name;
      img.loading = "lazy";
      img.decoding = "async";

      wrapper.appendChild(img);
      row.appendChild(wrapper);
      fragment.appendChild(row);
    });

      gallery.appendChild(fragment);
    }

  } catch (error) {
    console.error("Error loading images:", error);
  }
}

loadImages();
</script>
